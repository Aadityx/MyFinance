<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* ----------------- DARK THEME REGISTER PAGE ----------------- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  background: #0f172a; /* dark background to match other pages */
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  background-color: #1e293b; /* container matches dark page sections */
  padding: 40px;
  border-radius: 15px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7);
  transition: all 0.3s ease;
}

.container:hover {
  box-shadow: 0 12px 35px rgba(0, 0, 0, 0.9);
  transform: translateY(-2px);
}

/* Modern / futuristic heading */
h2 {
text-align: center;
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 20px;
  color: #fff;
}

/* subtitle text */
.subtitle {
  text-align: center;
  color: #94a3b8;
  font-size: 14px;
  margin-bottom: 28px;
  font-weight: 400;
}

/* Inputs */
.input-group {
  position: relative;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px 20px 14px 45px;
  border-radius: 10px;
  border: 1px solid #334155;
  background-color: #1e293b;
  color: #fff;
  font-size: 14px;
  transition: border 0.3s;
}

input:focus {
  outline: none;
  border: 1px solid #4f46e5;
  box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
}

.input-icon {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: #777;
  font-size: 16px;
  transition: color 0.3s;
}

input:focus + .input-icon {
  color: #4f46e5;
}

/* Buttons */
button {
  width: 100%;
  padding: 14px 0;
  background-color: #4f46e5;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.3s, transform 0.2s;
}

button:hover {
  background-color: #4338ca;
  transform: translateY(-1px);
}

button:active {
  transform: translateY(0);
}

/* Login link */
.login-link {
  text-align: center;
  margin-top: 16px;
}

.login-link a {
  color: #4f46e5;
  text-decoration: none;
  font-weight: 500;
  transition: color 0.2s ease;
}

.login-link a:hover {
  color: #6366f1;
  text-decoration: underline;
}

/* Responsive */
@media (max-width: 480px) {
  .container {
    padding: 32px 24px;
    margin: 10px;
  }
  
  h2 {
    font-size: 24px;
  }
}
  </style>
</head>
<body>

<div class="container">
  <h2>Register</h2>
  <p class="subtitle">Create your account</p>

  <div class="input-group">
    <input type="text" id="name" placeholder="Full Name">
    <i class="fas fa-user input-icon"></i>
  </div>

  <div class="input-group">
    <input type="email" id="email" placeholder="Email">
    <i class="fas fa-envelope input-icon"></i>
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="Password">
    <i class="fas fa-lock input-icon"></i>
  </div>

  <div class="input-group">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">
    <i class="fas fa-lock input-icon"></i>
  </div>

  <button onclick="register()">
    <i class="fas fa-user-plus"></i> Create Account
  </button>

  <div class="login-link">
    <a href="login.html">Already have an account? Login</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { 
    getAuth, 
    createUserWithEmailAndPassword 
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  import {
    getDatabase,
    ref,
    set
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBeY5noIZbapkdJiGUHkZ1f2Q8B8iyzUtQ",
    authDomain: "zion-542a2.firebaseapp.com",
    databaseURL: "https://zion-542a2-default-rtdb.firebaseio.com",
    projectId: "zion-542a2",
    storageBucket: "zion-542a2.firebasestorage.app",
    messagingSenderId: "472333505699",
    appId: "1:472333505699:web:51af49a05dec65e5bd9b16",
    measurementId: "G-67VN2GX0DE"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  window.register = async function () {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    // ✅ Validation
    if (!name || !email || !password || !confirmPassword) {
      alert("Fill all fields");
      return;
    }

    if (password !== confirmPassword) {
      alert("Passwords do not match");
      return;
    }

    try {
      // 🔐 Create Auth user
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      // 📦 Store extra data in Realtime DB
      await set(ref(db, 'users/' + user.uid), {
        name: name,
        email: email,
        createdAt: new Date().toISOString()
      });

      alert("Account created successfully!");
window.location.href = "login.html";
    } catch (error) {
      console.error(error);
      alert(error.message);
    }
  };
</script>

</body>
</html>
